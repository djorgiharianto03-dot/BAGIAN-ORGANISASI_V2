# CloudPanel → Site → Vhost → Custom (sesuaikan root & php upstream)

# HTTP → HTTPS
if ($scheme = http) {
    return 301 https://$host$request_uri;
}

# Hilangkan /index.php di URL beranda
location = /index.php {
    return 301 $scheme://$host/;
}

# Aset & unggahan — jangan eksekusi PHP
location ^~ /uploads/ {
    location ~ \.(php|phtml|php\d)$ {
        deny all;
        return 404;
    }
    try_files $uri =404;
}

# PHP (sesuaikan dengan template CloudPanel)
location ~ \.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass 127.0.0.1:17001; # ganti port PHP-FPM situs Anda
}
