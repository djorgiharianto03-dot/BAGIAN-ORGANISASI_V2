# CloudPanel → Site → Vhost → Custom (sesuaikan root & php upstream)
# Clean URL: /profil.php → /profil (301), /profil → profil.php (internal)

# HTTP → HTTPS
if ($scheme = http) {
    return 301 https://$host$request_uri;
}

# 301: /index.php → /
location = /index.php {
    if ($request_method = GET) {
        return 301 $scheme://$host/$is_args$args;
    }
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass 127.0.0.1:17001;
}

# 301 GET: *.php → clean URL (kecuali API jika perlu eksekusi langsung)
location ~ ^/(?!api/)(.+)\.php$ {
    if ($request_method = GET) {
        return 301 $scheme://$host/$1$is_args$args;
    }
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass 127.0.0.1:17001;
}

# Aset & unggahan — jangan eksekusi PHP
location ^~ /uploads/ {
    location ~ \.(php|phtml|php\d)$ {
        deny all;
        return 404;
    }
    try_files $uri =404;
}

# Clean URL → .php (root & admin)
location / {
    try_files $uri $uri/ @org_clean_url;
}

location @org_clean_url {
    rewrite ^/admin/([^/]+)/?$ /admin/$1.php last;
    rewrite ^/([^/]+)/?$ /$1.php last;
}

# PHP-FPM fallback (sesuaikan port CloudPanel)
location ~ \.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass 127.0.0.1:17001;
}
